services:
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "no"
      - --save
      - ""
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    ports:
      - "5001:6379"
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  receiver:
    build: .
    env_file: .env
    # `env_file` pulls everything from .env; `environment:` overrides the
    # bits that differ inside the docker network (REDIS_URL points at the
    # service name, not localhost) plus compose-level static config.
    environment:
      REDIS_URL: redis://redis:6379/0
      API_PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "worker.worker"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]
    depends_on:
      - receiver
    restart: unless-stopped

  # Web UI for inspecting Redis (streams, keys, TTLs). Opt-in only:
  #   docker compose --profile debug up -d redisinsight
  # Then http://localhost:5540 → Add Database → host=redis port=6379 password=$REDIS_PASSWORD
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    environment:
      # Auto-add the redis service on first run so you skip the "Add Database" form.
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: webhook_rx-redis
      RI_REDIS_USERNAME: default
      RI_REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redisinsight-data:/data
    profiles: ["debug"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redisinsight-data:
